            margin: 0 auto;
        }
        .nav-list {

            justify-content: center;

            gap: 30px;

        /* 左侧：厂房横幅 占50%宽度 */

            width: 50%;
            height: 320px;
            overflow: hidden;
            position: relative;
            background: #ffffff;
            border-radius: 8px;
        }
        .left-track {
            display: flex;
            height: 100%;
            transition: transform 0.6s ease;
        }
        .left-slide {
            flex: 0 0 100%;
            height: 100%;
        }
        .left-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .left-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .dot-left {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .dot-left.active {
            background: #28a745;
        }

        /* 右侧：产品横幅 占50%宽度 */
        .banner-right {
            width: 50%;
            height: 320px;
            overflow: hidden;
            position: relative;
            background-color: #f7f9fc;
            border-radius: 8px;
        }
        .right-track {
            display: flex;
            height: 100%;
            transition: transform 0.6s ease;
        }
        .right-slide {
            flex: 0 0 100%;
            height: 100%;
        }
        .right-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #f7f9fc;
        }
        .right-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .dot-right {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
        }
        .dot-right.active {
            background: #fff;
        }

        .product-section {
            padding: 50px 4%;
        }
        .section-title {
            text-align: center;
            font-size: 28px;
            margin-bottom: 40px;
            color: #222;
            text-transform: uppercase;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 25px;
        }
        .product-card {
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 6px;
            transition: 0.2s;
        }
        .product-card:hover {
            box-shadow: 0 3px 12px #ddd;
        }

        /* 产品卡片图片切换 */
        .img-slider {
            position: relative;
            height: 160px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .slider-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }
        .slider-img.active {
            display: block;
        }
        .slide-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            z-index: 2;
        }
        .prev-btn { left: 5px; }
        .next-btn { right: 5px; }

        .sku-name {
            font-size: 17px;
            color: #111;
            font-weight: bold;
            text-align: center;
            margin-bottom: 6px;
        }
        .desc-name {
            font-size: 14px;
            color: #555;
            text-align: center;
            line-height: 1.4;
        }

        /* 底部黑灰联系区域 */
        #contact-section {
            background-color: #333333;
            color: #ffffff;
            padding: 60px 4%;
            text-align: center;
        }
        .map-circle {
            width: 100%;
            max-width: 650px;
            height: 420px;
            background: #ffffff;
            margin: 0 auto 30px;
            border-radius: 8px;
            overflow: hidden;
        }
        .map-circle iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        .contact-title {
            font-size: 32px;
            margin-bottom: 30px;
            font-weight: normal;
        }
        .contact-detail p {
            font-size: 18px;
            line-height: 2;
            margin: 10px 0;
        }
        .contact-detail a {
            color: #fff;
            text-decoration: underline;
        }
        .back-top {
            display: inline-block;
            margin-top: 35px;
            padding: 10px 26px;
            background: #fff;
            color: #333;
            border-radius: 4px;
            font-weight: bold;
        }

        /* 移动端自动变为上下排列 */
        @media (max-width: 768px) {
            .banner-row {
                flex-direction: column;
            }
            .banner-left, .banner-right {
                width: 100%;
            }
        }
    </style>
</head>

<script>
    // 左侧厂房轮播逻辑
    const leftTrack = document.querySelector('.left-track');
    const leftSlides = document.querySelectorAll('.left-slide');
    const leftDots = document.querySelectorAll('.dot-left');
    let leftIndex = 0;
    const leftTotal = leftSlides.length;
    function updateLeft() {
        leftTrack.style.transform = `translateX(-${leftIndex * 100}%)`;
        leftDots.forEach((dot, idx) => dot.classList.toggle('active', idx === leftIndex));
    }
    function nextLeft() {
        leftIndex = (leftIndex + 1) % leftTotal;
        updateLeft();
    }
    leftDots.forEach(dot => dot.addEventListener('click', () => {
        leftIndex = Number(dot.dataset.index);
        updateLeft();
    }));
    setInterval(nextLeft, 4500);

    // 右侧产品轮播逻辑
    const rightTrack = document.querySelector('.right-track');
    const rightSlides = document.querySelectorAll('.right-slide');
    const rightDots = document.querySelectorAll('.dot-right');
    let rightIndex = 0;
    const rightTotal = rightSlides.length;
    function updateRight() {
        rightTrack.style.transform = `translateX(-${rightIndex * 100}%)`;
        rightDots.forEach((dot, idx) => dot.classList.toggle('active', idx === rightIndex));
    }
    function nextRight() {
        rightIndex = (rightIndex + 1) % rightTotal;
        updateRight();
    }
    rightDots.forEach(dot => dot.addEventListener('click', () => {
        rightIndex = Number(dot.dataset.index);
        updateRight();
    }));
    setInterval(nextRight, 4000);
</script>

<script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCMx-Kyp9zaYFWNOqkRXP9FogYGYI77eU1ZZt--guZRFNRjsHuJBeB7ZkOaolrAYnfbZThlJ82zJtB/pub?gid=1677472404&single=true&output=csv";

    async function loadProducts() {
        const container = document.getElementById('productContainer');
        try {
            const res = await fetch(SHEET_CSV_URL);
            const csvText = await res.text();
            const rows = csvText.trim().split("\n");
            let html = "";

            for(let i = 1; i < rows.length; i++){
                const cols = rows[i].split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);
                const sku = cols[0]?.trim() || "";
                const desc = cols[1]?.trim() || "";
                const imgRaw = cols[2]?.trim() || "";
                let imgArr = imgRaw.split(",").slice(0,3);

                let imgHtml = "";
                imgArr.forEach((imgUrl, idx)=>{
                    let actClass = idx === 0 ? "active" : "";
                    imgHtml += `<img class="slider-img ${actClass}" src="${imgUrl.trim()}" alt="${sku}">`;
                })

                let btnHtml = imgArr.length > 1 ? `
                    <button class="slide-btn prev-btn" onclick="slideImage(this, -1)">&lt;</button>
                    <button class="slide-btn next-btn" onclick="slideImage(this, 1)">&gt;</button>
                ` : "";

                html += `
                <div class="product-card">
                    <div class="img-slider">
                        ${imgHtml}
                        ${btnHtml}
                    </div>
                    <div class="sku-name">${sku}</div>
                    <div class="desc-name">${desc}</div>
                </div>
                `;
            }
            container.innerHTML = html;
        } catch (err) {
            container.innerHTML = "<div style='grid-column: 1/-1; text-align:center; padding:30px; color:red;'>Failed to load products. Check your Google Sheet link.</div>";
            console.error(err);
        }
    }

    window.slideImage = function(btn, step){
        const sliderWrap = btn.parentElement;
        const allImgs = sliderWrap.querySelectorAll(".slider-img");
        let activeIdx = 0;
        allImgs.forEach((img, idx)=>{
            if(img.classList.contains("active")) activeIdx = idx;
        })
        allImgs[activeIdx].classList.remove("active");
        activeIdx = activeIdx + step;
        if(activeIdx >= allImgs.length) activeIdx = 0;
        if(activeIdx < 0) activeIdx = allImgs.length - 1;
        allImgs[activeIdx].classList.add("active");
    }

    window.addEventListener("DOMContentLoaded", loadProducts);
</script>
